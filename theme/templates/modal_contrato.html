<dialog id="modal_contrato" class="modal w-8/12 rounded-2xl">
    <div class="modal-box w-full p-0 bg-[#F7F4EE] rounded-lg shadow-lg">
        <div class="flex items-center justify-between px-6 py-3 border-b border-[#D4B96A]/20 bg-[#F7F4EE] rounded-t-lg">
            <h3 class="text-sm font-medium text-[#5a4a35]">Información del contrato</h3>
            <form method="dialog">
                <button class="bg-[#D4B96A]/10 border border-[#D4B96A]/40 text-[#D4B96A] rounded-full w-7 h-7 flex items-center justify-center text-sm cursor-pointer leading-none transition-colors hover:bg-[#D4B96A]/20">✕</button>
            </form>
        </div>

        <div class="h-[calc(100%-48px)] overflow-y-auto p-6">
            <div id="contenido-contrato" class="text-sm text-[#5a4a35] leading-relaxed">
                <!-- Aquí se cargará dinámicamente el contenido del contrato -->
            </div>
    </div>


    <form method="dialog" class="modal-backdrop">
        <button class="cursor-default hidden">close</button>
    </form>

</dialog>
